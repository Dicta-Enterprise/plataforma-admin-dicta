<p-dialog
  [(visible)]="visible"
  [modal]="true"
  [style]="{ width: '42rem' }"
  [header]="title"
  (onHide)="close()"
>

  <form
    [formGroup]="landingFormPresenter.Form"
    class="flex flex-column gap-3"
  >
  <div class="flex flex-column gap-3">
    <div class="flex flex-column gap-2">
      <label>Titulo</label>
      <input pInputText formControlName="titulo" />
    </div>

    <div class="flex flex-column gap-2">
      <label>Descripcion</label>
      <textarea pInputTextarea rows="3" formControlName="descripcion"></textarea>
    </div>

    <div class="grid">
      <div class="col-12 md:col-6 flex flex-column gap-2">
        <label>Slug</label>
        <input pInputText formControlName="slug" />
      </div>

      <div class="col-12 md:col-6 flex flex-column gap-2">
        <label>Landing URL</label>
        <input pInputText formControlName="landingUrl" />
      </div>
    </div>

    <div class="grid">
      <div class="col-12 md:col-6 flex flex-column gap-2">
        <label>Imagen principal</label>
        <input pInputText formControlName="imagenPrincipal" />
      </div>

      <div class="col-12 md:col-6 flex flex-column gap-2">
        <label>Meta keywords</label>
        <input pInputText formControlName="metaKeywords" />
      </div>
    </div>

    <div class="flex flex-column gap-2">
      <label>Contenido (una linea por item)</label>
      <textarea 
        pInputTextarea 
        rows="4" 
        formControlName="contenidoTexto">
      </textarea>
    </div>

    <div class="flex flex-column gap-2">
      <label>Imagenes landing (una URL por linea)</label>
      <textarea 
        pInputTextarea 
        rows="4" 
        formControlName="imagenesTexto">
      </textarea>
    </div>

    <div class="flex flex-column gap-2">
      <label>Colores (uno por linea, ej: #2563eb)</label>
      <textarea 
        pInputTextarea 
        rows="3" 
        formControlName="coloresTexto">
      </textarea>
    </div>

    <div class="flex align-items-center gap-2">
      <label>Estado</label>
      <p-toggleswitch formControlName="estado"></p-toggleswitch>
    </div>    
  </div>
  </form>

  <ng-template pTemplate="footer">
    <button
      pButton
      type="button"
      label="Cancelar"
      class="p-button-text"
      (click)="close()"
    ></button>

    <button
      pButton
      type="button"
      [label]="isEdit ? 'Actualizar' : 'Guardar'"
      (click)="guardarLanding()"
      [disabled]="landingFormPresenter.Form.invalid"
    ></button>
  </ng-template>
</p-dialog>
