<p-dialog
  [(visible)]="visible"
  appendTo="body"
  [modal]="true"
  [breakpoints]="{ '960px': '75vw', '640px': '90vw' }"
  [style]="{ width: '30vw' }"
  [draggable]="false"
  [resizable]="false">

  <ng-template pTemplate="header">
    <div class="flex flex-column gap-1">
      <h1 class="m-0 text-900 font-semibold text-xl">Eliminar curso</h1>
      <span class="text-600 text-sm">Esta acción no se puede deshacer</span>
    </div>
  </ng-template>

  <div class="flex align-items-center gap-3 pt-3 px-4">
    <i class="pi pi-exclamation-triangle text-4xl text-orange-500"></i>
    <p class="m-0 text-900">
      ¿Estás seguro de que deseas eliminar el curso
      <strong>{{ curso.nombre || curso.id }}</strong>?
    </p>
  </div>

  <ng-template pTemplate="footer">
    <div class="flex justify-content-end gap-2">
      <p-button
        label="Cancelar"
        icon="pi pi-times"
        iconPos="right"
        variant="outlined"
        class="text-gray-600"
        (onClick)="close()"
      />
      <p-button
        label="Eliminar"
        icon="pi pi-trash"
        iconPos="right"
        severity="danger"
        (onClick)="confirmar()"
      />
    </div>
  </ng-template>
</p-dialog>
